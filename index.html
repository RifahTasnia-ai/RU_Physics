        // --- EXAM LOGIC ---
        let userAnswers = {};
        let currentSet = 0;
        let timerInterval;

        function startExam(setId) {
            currentSet = setId;
            userAnswers = {};
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            document.getElementById('timer').classList.remove('hidden');
            
            // Start Timer
            let time = 25 * 60;
            timerInterval = setInterval(() => {
                time--;
                let m = Math.floor(time / 60);
                let s = time % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10? '0'+s : s}`;
                if (time <= 0) submitExam();
            }, 1000);

            // Render Questions
            const qList = document.getElementById('question-list');
            qList.innerHTML = questionBank[setId].map((q, index) => `
                <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-100 fade-in">
                    <p class="font-bold text-lg text-slate-800 mb-4"><span class="text-indigo-600">প্রশ্ন ${index+1}:</span> ${q.q}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${q.options.map((opt, i) => `
                            <div>
                                <input type="radio" name="q${q.id}" id="q${q.id}o${i}" class="hidden option-radio" onchange="selectAnswer(${q.id}, ${i})">
                                <label for="q${q.id}o${i}" class="option-label block p-3 rounded border border-slate-200 text-slate-600 hover:bg-indigo-50">
                                    ${['ক','খ','গ','ঘ'][i]}) ${opt}
                                </label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectAnswer(qid, optIndex) {
            userAnswers[qid] = optIndex;
        }

        function submitExam() {
            clearInterval(timerInterval);
            document.getElementById('exam-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('timer').classList.add('hidden');

            let score = 0;
            let questions = questionBank;
            let solutionHTML = '';

            questions.forEach((q, idx) => {
                let userAns = userAnswers[q.id];
                let isCorrect = userAns === q.correct;
                let skipped = userAns === undefined;
                
                if (isCorrect) score += 1.0;
                else if (!skipped) score -= 0.25;

                let statusColor = isCorrect? 'text-green-600' : (skipped? 'text-slate-400' : 'text-red-600');
                let statusText = isCorrect? 'সঠিক' : (skipped? 'উত্তর করা হয়নি' : 'ভুল');

                solutionHTML += `
                    <div class="bg-slate-50 p-5 rounded-lg border-l-4 ${isCorrect? 'border-green-500' : 'border-red-400'}">
                        <div class="flex justify-between mb-2">
                            <span class="font-bold text-slate-700">প্রশ্ন ${idx+1}</span>
                            <span class="font-bold ${statusColor}">${statusText}</span>
                        </div>
                        <p class="mb-2 font-medium">${q.q}</p>
                        <p class="text-sm text-slate-500 mb-2">সঠিক উত্তর: <span class="font-bold text-slate-700">${q.options[q.correct]}</span></p>
                        <div class="bg-white p-3 rounded text-sm text-slate-600 shadow-sm">
                            <strong class="text-indigo-600">💡 ব্যাখ্যা/শর্টকাট:</strong> ${q.sol}
                        </div>
                    </div>
                `;
            });

            document.getElementById('score-display').innerText = score.toFixed(2);
            document.getElementById('solution-list').innerHTML = solutionHTML;
            window.scrollTo(0,0);
        }
